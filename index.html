<!DOCTYPE html>
<html lang="it" style="-webkit-text-size-adjust:100%;">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0d7a6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan3DFeet — Partner Program</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f1923;
    --ink-soft: #3d4f5c;
    --ink-faint: #8a9ba8;
    --teal: #0d7a6b;
    --teal-light: #e6f5f2;
    --teal-mid: #b2ddd7;
    --gold: #c8922a;
    --gold-light: #fdf3e3;
    --cream: #faf8f5;
    --white: #ffffff;
    --border: #e2e8ec;
    --shadow: 0 2px 16px rgba(15,25,35,0.07);
    --shadow-lg: 0 8px 40px rgba(15,25,35,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 3rem; height: 64px;
  }
  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem; color: var(--ink); letter-spacing: -0.02em;
  }
  .nav-logo span { color: var(--teal); font-style: italic; }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a {
    font-size: 0.85rem; font-weight: 500; color: var(--ink-soft);
    text-decoration: none; letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--teal); }
</style>
</head>
<body><p>Test</p></body></html>
